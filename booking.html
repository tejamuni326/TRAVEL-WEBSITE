<section class="hero">

<h2>Book Your Dream Vacation</h2>

<p>Fill in the details below and our travel consultant will contact you shortly.</p>

</section>

<section class="booking-form">

<form onsubmit="return validateForm()">

<label>Full Name</label><br>
<input type="text" id="name" required><br><br>

<label>Email</label><br>
<input type="email" id="email" required><br><br>

<label>Phone Number</label><br>
<input type="tel" id="phone" required><br><br>

<label>Select Destination</label><br>

<select required>

<option>Goa</option>

<option>Kerala</option>

<option>Manali</option>

<option>Kashmir</option>

<option>Ladakh</option>

<option>Taj Mahal</option>

</select>

<br><br>

<label>Number of Travelers</label><br>

<input type="number" min="1" max="20" required>

<br><br>

<label>Departure Date</label><br>

<input type="date" required>

<br><br>

<label>Special Requests</label><br>

<textarea rows="5"></textarea>

<br><br>

<button type="submit">Book Now</button>

</form>

</section>
